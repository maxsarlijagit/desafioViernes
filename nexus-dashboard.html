<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus Dashboard — Control Center</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --void: #050508;
      --panel: #0a0a12;
      --panel-light: #12121f;
      --cyan: #00f0ff;
      --cyan-dim: #00a0aa;
      --magenta: #ff00aa;
      --gold: #ffd700;
      --green: #00ff88;
      --text: #a0a0b0;
      --text-bright: #e0e0f0;
      --selected: #ffaa00;
    }
    
    body {
      font-family: 'Share Tech Mono', monospace;
      background: var(--void);
      color: var(--text);
      min-height: 100vh;
    }
    
    .container { max-width: 1400px; margin: 0 auto; padding: clamp(0.5rem, 2vw, 1.5rem); }
    
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: clamp(0.5rem, 2vw, 1.5rem) clamp(1rem, 3vw, 2.5rem);
      background: var(--panel);
      border: 2px solid var(--cyan-dim);
      margin-bottom: clamp(0.5rem, 2vw, 1.5rem);
      flex-wrap: wrap;
      gap: 1rem;
    }
    
    .logo { font-family: 'Orbitron', sans-serif; font-weight: 900; color: var(--cyan); letter-spacing: 2px; font-size: clamp(1rem, 3vw, 1.5rem); }
    
    .selected-project { color: var(--selected); padding: 0.5rem 1rem; border: 2px solid var(--selected); font-size: clamp(0.7rem, 2vw, 1rem); }
    
    .status-bar { display: flex; gap: 1rem; align-items: center; font-size: clamp(0.6rem, 1.5vw, 0.9rem); }
    .status-item { display: flex; align-items: center; gap: 0.4rem; }
    .status-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; animation: blink 2s infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    
    .dashboard { display: grid; grid-template-columns: 2fr 1fr; gap: clamp(0.5rem, 2vw, 1.5rem); }
    
    .panel {
      background: var(--panel);
      border: 2px solid var(--cyan-dim);
      padding: clamp(0.5rem, 2vw, 1.5rem);
    }
    
    .panel-title {
      font-family: 'Orbitron', sans-serif;
      color: var(--cyan);
      margin-bottom: clamp(0.5rem, 2vw, 1.5rem);
      font-size: clamp(0.8rem, 2vw, 1.2rem);
    }
    
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: clamp(0.3rem, 1vw, 0.75rem); }
    .stat-box { background: var(--panel-light); border: 2px solid #444; padding: 0.5rem; text-align: center; }
    .stat-value { font-family: 'Orbitron', sans-serif; color: var(--cyan); font-size: clamp(1.2rem, 4vw, 2rem); }
    .stat-label { color: var(--text); text-transform: uppercase; font-size: clamp(0.5rem, 1.2vw, 0.8rem); }
    
    .team-mini-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: clamp(0.3rem, 1vw, 0.5rem); }
    .team-mini-member { background: var(--panel-light); border: 2px solid #444; padding: 0.4rem; text-align: center; font-size: clamp(0.5rem, 1.2vw, 0.75rem); }
    .team-mini-avatar { width: clamp(16px, 4vw, 28px); height: clamp(16px, 4vw, 28px); border-radius: 50%; margin: 0 auto 0.3rem; }
    
    .repo-cards { display: grid; grid-template-columns: 1fr 1fr; gap: clamp(0.3rem, 1vw, 0.75rem); }
    .repo-card { background: var(--panel-light); border: 3px solid #444; padding: 0.75rem; cursor: pointer; transition: all 0.3s; }
    .repo-card:hover { border-color: var(--cyan); transform: translateY(-4px); }
    .repo-card.selected { border-color: var(--selected); }
    .repo-card.selected::after { content: '✓'; position: absolute; top: 4px; right: 4px; background: var(--selected); color: var(--void); width: 20px; height: 20px; border-radius: 50%; font-size: 0.7rem; display: flex; align-items: center; justify-content: center; }
    .repo-card { position: relative; }
    .repo-name { font-family: 'Orbitron', sans-serif; color: var(--text-bright); margin-bottom: 0.3rem; font-size: clamp(0.7rem, 1.8vw, 1rem); }
    .repo-desc { color: var(--text); margin-bottom: 0.5rem; font-size: clamp(0.6rem, 1.4vw, 0.9rem); }
    .repo-meta { display: flex; justify-content: space-between; font-size: clamp(0.5rem, 1.2vw, 0.8rem); }
    .repo-lang { color: var(--magenta); }
    .repo-status { padding: 2px 6px; border: 2px solid; font-size: clamp(0.4rem, 1vw, 0.7rem); }
    .status-alpha { border-color: var(--selected); color: var(--selected); }
    .status-planning { border-color: var(--cyan); color: var(--cyan); }
    
    .activity-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: clamp(0.3rem, 1vw, 0.5rem); }
    .activity-item { background: var(--panel-light); padding: 0.5rem; border: 2px solid #444; font-size: clamp(0.5rem, 1.2vw, 0.75rem); }
    .activity-user { color: var(--cyan); margin-bottom: 0.15rem; }
    .activity-repo { color: var(--text-bright); }
    .activity-commit { color: var(--green); margin-top: 0.15rem; }
    .activity-time { color: #666; margin-top: 0.15rem; }
    
    .synergy-section { grid-column: 2; grid-row: 2 / 4; }
    .map-container {
      background: var(--panel-light);
      border: 2px solid #333;
      height: clamp(250px, 50vw, 450px);
      position: relative;
      overflow: hidden;
    }
    
    .particles { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; }
    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: var(--cyan);
      border-radius: 50%;
      opacity: 0.6;
      animation: float 8s infinite ease-in-out;
    }
    @keyframes float { 0%, 100% { opacity: 0.6; } 50% { opacity: 0.3; } }
    
    .grid-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: linear-gradient(rgba(0,240,255,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0,240,255,0.04) 1px, transparent 1px);
      background-size: clamp(20px, 4vw, 35px) clamp(20px, 4vw, 35px);
      animation: gridPulse 4s ease-in-out infinite;
    }
    @keyframes gridPulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
    
    .node {
      position: absolute;
      width: clamp(45px, 10vw, 70px);
      height: clamp(45px, 10vw, 70px);
      border-radius: 50%;
      background: var(--panel);
      border: 3px solid var(--cyan);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s;
      font-size: clamp(0.4rem, 1vw, 0.7rem);
      color: var(--text-bright);
      z-index: 10;
    }
    .node:hover { transform: scale(1.2); border-color: var(--magenta); z-index: 20; }
    .node-pm { border-color: var(--gold); }
    .node-dev { border-color: var(--cyan); }
    .node-ta { border-color: var(--magenta); }
    .node-artist { border-color: var(--green); }
    .node .role-badge { font-size: clamp(0.3rem, 0.8vw, 0.55rem); padding: 2px 4px; background: rgba(0,0,0,0.6); border-radius: 3px; margin-top: 2px; }
    
    .connection { position: absolute; height: 2px; background: linear-gradient(90deg, var(--cyan-dim), var(--magenta)); transform-origin: left center; opacity: 0.5; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 0.3; } 50% { opacity: 0.7; } }
    
    /* Responsive breakpoint */
    @media (max-width: 1100px) {
      .dashboard { grid-template-columns: 1fr; }
      .synergy-section { grid-row: auto; }
      .activity-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 700px) {
      .stats-grid { grid-template-columns: 1fr; }
      .team-mini-grid { grid-template-columns: repeat(3, 1fr); }
      .repo-cards { grid-template-columns: 1fr; }
      .activity-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">⚡ NEXUS DASHBOARD</div>
      <div class="selected-project" id="selected-project">☐ Selecciona un proyecto</div>
      <div class="status-bar">
        <div class="status-item"><span class="status-dot"></span><span>ONLINE</span></div>
        <div class="status-item"><span id="clock">00:00</span></div>
      </div>
    </header>

    <div class="dashboard">
      <div class="panel stats-panel">
        <div class="panel-title">≫ ESTADÍSTICAS</div>
        <div class="stats-grid">
          <div class="stat-box"><div class="stat-value">12</div><div class="stat-label">Miembros</div></div>
          <div class="stat-box"><div class="stat-value">2</div><div class="stat-label">Proyectos</div></div>
          <div class="stat-box"><div class="stat-value">✓</div><div class="stat-label">Sistema OK</div></div>
        </div>
      </div>
      
      <div class="panel team-mini">
        <div class="panel-title">≫ EQUIPO</div>
        <div class="team-mini-grid" id="team-mini"></div>
      </div>

      <div class="panel tool-grid-section">
        <div class="panel-title">≫ PROYECTOS (Click)</div>
        <div class="repo-cards">
          <div class="repo-card" data-project="theoffice">
            <div class="repo-name">🎮 THE OFFICE</div>
            <div class="repo-desc">Oficina virtual 2D multiplayer</div>
            <div class="repo-meta"><span class="repo-lang">TypeScript</span><span class="repo-status status-alpha">ALPHA</span></div>
          </div>
          <div class="repo-card" data-project="nexus">
            <div class="repo-name">📊 NEXUS DASHBOARD</div>
            <div class="repo-desc">Centro de control sinergias</div>
            <div class="repo-meta"><span class="repo-lang">JavaScript</span><span class="repo-status status-planning">BUILDING</span></div>
          </div>
        </div>
        <div class="panel-title" style="margin-top: 1rem;">≫ ÚLTIMA ACTIVIDAD</div>
        <div class="activity-grid" id="activity-grid"></div>
      </div>

      <div class="panel synergy-section">
        <div class="panel-title">≫ SYNERGY MAP</div>
        <div class="map-container" id="map">
          <div class="grid-overlay"></div>
          <div class="particles" id="particles"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const projectRoles = {
      theoffice: { 'maxsarlija': 'Dev', 'pulpt37': 'Dev', 'mariano9700': 'TA', 'kalil94': 'TA', 'manucastellani': 'TA', 'ElkronAiken': 'TA', 'facu041294': 'TA', 'fferrarello': 'Artist', 'arteaga.rey': 'Artist', 'Igor-Streiff': 'PM', 'marianopenovi': 'TA' },
      nexus: { 'Igor-Streiff': 'PM', 'maxsarlija': 'Dev', 'pulpt37': 'Dev', 'mariano9700': 'TA', 'kalil94': 'Artist', 'manucastellani': 'TA', 'ElkronAiken': 'TA', 'facu041294': 'TA', 'fferrarello': 'Artist', 'arteaga.rey': 'Artist', 'marianopenovi': 'TA' }
    };
    const projectConnections = {
      theoffice: [[0,1],[0,2],[1,3],[1,4],[2,5],[3,4],[4,5]],
      nexus: [[0,1],[0,2],[1,3],[2,3],[3,4],[3,5],[4,5]]
    };
    const team = [
      { name: 'Igor', github: 'Igor-Streiff', baseRole: 'PM', color: 'var(--gold)' },
      { name: 'Max', github: 'maxsarlija', baseRole: 'Dev', color: 'var(--cyan)' },
      { name: 'Manuel', github: 'pulpt37', baseRole: 'Dev', color: 'var(--cyan)' },
      { name: 'Mariano', github: 'mariano9700', baseRole: 'TA', color: 'var(--magenta)' },
      { name: 'Kalil', github: 'kalil94', baseRole: 'TA', color: 'var(--magenta)' },
      { name: 'Franco', github: 'fferrarello', baseRole: 'Artist', color: 'var(--green)' },
      { name: 'Mauricio', github: 'ElkronAiken', baseRole: 'TA', color: 'var(--magenta)' },
      { name: 'Facundo', github: 'facu041294', baseRole: 'TA', color: 'var(--magenta)' },
      { name: 'Alejandro', github: 'arteaga.rey', baseRole: 'Artist', color: 'var(--green)' },
      { name: 'Mariano P', github: 'marianopenovi', baseRole: 'TA', color: 'var(--magenta)' }
    ];
    let selectedProject = null;
    
    setInterval(() => { document.getElementById('clock').textContent = new Date().toLocaleTimeString('es-AR', {hour:'2-digit', minute:'2-digit'}); }, 1000);
    
    const teamMini = document.getElementById('team-mini');
    team.forEach(m => { const el = document.createElement('div'); el.className = 'team-mini-member'; el.innerHTML = `<div class="team-mini-avatar" style="background: ${m.color}"></div><div>${m.name.split(' ')[0]}</div>`; teamMini.appendChild(el); });
    
    const particles = document.getElementById('particles');
    for (let i = 0; i < 20; i++) { const p = document.createElement('div'); p.className = 'particle'; p.style.left = Math.random() * 100 + '%'; p.style.top = Math.random() * 100 + '%'; p.style.animationDelay = Math.random() * 5 + 's'; p.style.animationDuration = (5 + Math.random() * 5) + 's'; particles.appendChild(p); }
    
    document.querySelectorAll('.repo-card').forEach(card => {
      card.addEventListener('click', () => {
        document.querySelectorAll('.repo-card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        selectedProject = card.dataset.project;
        const names = { theoffice: 'THE OFFICE', nexus: 'NEXUS DASHBOARD' };
        document.getElementById('selected-project').textContent = '☐ ' + names[selectedProject];
        updateMap(selectedProject);
        fetchActivity();
      });
    });
    
    function updateMap(project) {
      const map = document.getElementById('map');
      map.querySelectorAll('.node, .connection').forEach(el => el.remove());
      const roles = projectRoles[project] || {};
      const connections = projectConnections[project] || [];
      const containerW = map.offsetWidth || 400;
      const containerH = map.offsetHeight || 400;
      const nodeSize = Math.min(containerW, containerH) / 6;
      const nodes = team.slice(0, 8).map((m, i) => ({ name: m.name.split(' ')[0], x: 30 + (i % 4) * (containerW - 60) / 3, y: 40 + Math.floor(i / 4) * (containerH - 60) / 2, role: (roles[m.github] || m.baseRole).toLowerCase() }));
      nodes.forEach(node => { const el = document.createElement('div'); el.className = `node node-${node.role}`; el.style.left = node.x + 'px'; el.style.top = node.y + 'px'; el.innerHTML = `<div>${node.name}</div><div class="role-badge">${node.role.toUpperCase()}</div>`; map.appendChild(el); });
      connections.forEach(([from, to]) => { if (nodes[from] && nodes[to]) { const line = document.createElement('div'); line.className = 'connection'; const x1 = nodes[from].x + nodeSize/2, y1 = nodes[from].y + nodeSize/2, x2 = nodes[to].x + nodeSize/2, y2 = nodes[to].y + nodeSize/2, len = Math.sqrt((x2-x1)**2 + (y2-y1)**2), ang = Math.atan2(y2-y1, x2-x1) * 180 / Math.PI; line.style.left = x1 + 'px'; line.style.top = y1 + 'px'; line.style.width = len + 'px'; line.style.transform = `rotate(${ang}deg)`; map.appendChild(line); } });
    }
    
    async function fetchActivity() {
      const grid = document.getElementById('activity-grid');
      grid.innerHTML = '';
      for (const m of team.slice(0, 8)) {
        try {
          const resp = await fetch(`https://api.github.com/users/${m.github}/events?per_page=3`);
          const events = await resp.json();
          const push = events?.find(e => e.type === 'PushEvent');
          const repo = push?.repo?.name || 'Sin actividad';
          const msg = push?.payload?.commits?.[0]?.message?.substring(0, 30) || '';
          const time = push ? getTimeAgo(new Date(push.created_at)) : 'Nunca';
          const el = document.createElement('div');
          el.className = 'activity-item';
          el.innerHTML = `<div class="activity-user">@${m.github}</div><div class="activity-repo">${repo}</div><div class="activity-commit">${msg}</div><div class="activity-time">${time}</div>`;
          grid.appendChild(el);
        } catch(e) {
          const el = document.createElement('div');
          el.className = 'activity-item';
          el.innerHTML = `<div class="activity-user">@${m.github}</div><div class="activity-repo">—</div><div class="activity-commit">Sin actividad</div><div class="activity-time">—</div>`;
          grid.appendChild(el);
        }
      }
    }
    
    function getTimeAgo(d) { const s = Math.floor((new Date() - d) / 1000); if (s < 60) return 'Ahora'; if (s < 3600) return Math.floor(s/60) + 'm'; if (s < 86400) return Math.floor(s/3600) + 'h'; return Math.floor(s/86400) + 'd'; }
    
    window.addEventListener('resize', () => { if (selectedProject) updateMap(selectedProject); });
    updateMap(null);
    fetchActivity();
    setInterval(fetchActivity, 60000);
  </script>
</body>
</html>
